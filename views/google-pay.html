<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pay</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script async src="https://pay.google.com/gp/p/js/pay.js"></script>
</head>
<body>
    <main>
        <div class="google-payment-page">
            <div class="payment-container glass-effect">
                <div class="payment-grid">
                    <div class="summary">
                        <h2>Google Pay</h2>
                        <p><strong>Merchant:</strong> Salama Blue Lodge</p>
                        <p><strong>Amount:</strong> <span id="amount">Loading...</span></p>
                        <p><strong>Description:</strong> Lodge Booking</p>
                    </div>

                    <div class="payment-action">
                        <h2>Complete Payment</h2>
                        <p class="instruction">Click below to pay with Google Pay</p>

                        <div class="payment-options">
                            <div id="google-pay-button"></div>
                        </div>

                        <div id="paymentStatus" style="margin-block-start: 20px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/google-pay.js"></script>
</body>
</html></content>
